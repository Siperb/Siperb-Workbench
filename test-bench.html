<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siperb Workbench — Test Bench</title>
    <script type="module" src="./builder/SiperbWorkBenchBuilder.js"></script>
    <script src="./main.js"></script>
    <!-- Favicon -->
    <link rel="icon" href="./favicon.png">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { display: flex; height: 100vh; font-family: 'Segoe UI', system-ui, monospace; font-size: 13px; background: #111; color: #ddd; overflow: hidden; }

        /* ── Left panel ─────────────────────────────────────────────── */
        #left { width: 360px; min-width: 260px; display: flex; flex-direction: column; border-right: 1px solid #2a2a2a; background: #141414; }

        #toolbar { padding: 14px 14px 10px; background: #181818; border-bottom: 1px solid #252525; display: flex; flex-direction: column; gap: 10px; }
        #toolbar h1 { font-size: 11px; font-weight: 600; color: #555; letter-spacing: 1.5px; text-transform: uppercase; }

        #phone-status { font-size: 11px; color: #9e9e9e; }

        /* Pick row */
        #pick-row { display: flex; gap: 6px; }
        .pick-btn {
            flex: 1; padding: 7px 10px; border: 1px solid #2e2e2e; background: #1e1e1e;
            color: #aaa; cursor: pointer; border-radius: 5px; font-size: 12px;
            display: flex; align-items: center; justify-content: center; gap: 6px;
            transition: background .15s, border-color .15s;
        }
        .pick-btn:hover { background: #252525; border-color: #3a3a3a; color: #ccc; }
        .pick-btn.active { border-color: #4a9eff; color: #4a9eff; background: #141e2e; }
        .pick-btn svg { flex-shrink: 0; }
        #filePicker { display: none; }

        /* URL row */
        #url-row { display: none; gap: 6px; }
        #url-row.open { display: flex; }
        #github-url-input {
            flex: 1; padding: 6px 8px; border: 1px solid #2e2e2e; border-radius: 5px;
            background: #161616; color: #ccc; font-size: 11px; outline: none; min-width: 0;
        }
        #github-url-input:focus { border-color: #4a9eff; }
        #github-url-input::placeholder { color: #3a3a3a; }
        #fetch-url-btn {
            padding: 6px 10px; border: 1px solid #2e2e2e; background: #1e1e1e;
            color: #aaa; cursor: pointer; border-radius: 5px; font-size: 11px; white-space: nowrap;
            transition: background .15s;
        }
        #fetch-url-btn:hover { background: #252525; color: #ccc; }

        /* Run button */
        #run-btn {
            width: 100%; padding: 10px; border: none; border-radius: 6px;
            background: #2e7d32; color: #fff; font-size: 13px; font-weight: 600;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            gap: 8px; transition: background .15s, opacity .15s; letter-spacing: .3px;
        }
        #run-btn:hover:not(:disabled) { background: #388e3c; }
        #run-btn:disabled { opacity: 0.35; cursor: not-allowed; }
        #run-btn svg { flex-shrink: 0; }

        /* Stat cards */
        #stat-cards { display: flex; gap: 6px; }
        .stat-card {
            flex: 1; padding: 8px 6px 6px; border-radius: 6px; border: 1px solid #252525;
            background: #181818; text-align: center;
        }
        .stat-card .stat-val {
            font-size: 20px; font-weight: 700; line-height: 1.1;
            font-variant-numeric: tabular-nums;
        }
        .stat-card .stat-lbl { font-size: 9px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; margin-top: 2px; opacity: 0.55; }
        #stat-total .stat-val { color: #888; }
        #stat-pass  .stat-val { color: #4caf50; }
        #stat-fail  .stat-val { color: #e57373; }

        /* Test list */
        #test-list { overflow-y: auto; max-height: 200px; border-bottom: 1px solid #1e1e1e; }
        .suite-header { padding: 5px 12px 3px; font-size: 10px; font-weight: 700; color: #4a9eff; letter-spacing: 1px; text-transform: uppercase; background: #161616; border-bottom: 1px solid #1e1e1e; }
        .test-item { padding: 5px 12px 5px 20px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid #191919; font-size: 12px; color: #bbb; }
        .test-item .dot { width: 6px; height: 6px; border-radius: 50%; background: #333; flex-shrink: 0; }
        .test-item.running .dot { background: #4a9eff; box-shadow: 0 0 5px #4a9eff88; }
        .test-item.pass .dot { background: #4caf50; }
        .test-item.fail .dot { background: #e57373; }
        .test-item .test-label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .test-item .test-msg { font-size: 10px; color: #555; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 120px; }
        .test-item.pass .test-msg { color: #4caf5088; }
        .test-item.fail .test-msg { color: #e5737388; }

        /* Log area */
        #log-area { flex: 1; overflow-y: auto; padding: 10px 12px; background: #0d0d0d; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 11px; }
        .log-line { padding: 1px 0; line-height: 1.6; word-break: break-all; }
        .log-line.info   { color: #555; }
        .log-line.pass   { color: #4caf50; }
        .log-line.fail   { color: #e57373; }
        .log-line.log    { color: #888; }
        .log-line.section { color: #4a9eff; margin-top: 6px; font-weight: 600; }

        /* ── Right panel ────────────────────────────────────────────── */
        #right { flex: 1; display: flex; flex-direction: column; }
        #phoneFrame { flex: 1; width: 100%; border: none; background: #fff; }

        /* ── Results dialog ─────────────────────────────────────────── */
        #results-overlay {
            display: none; position: fixed; inset: 0; background: #000000cc;
            z-index: 1000; align-items: center; justify-content: center;
        }
        #results-overlay.open { display: flex; }
        #results-dialog {
            background: #1a1a1a; border: 1px solid #2e2e2e; border-radius: 10px;
            width: 520px; max-width: 92vw; max-height: 80vh; display: flex; flex-direction: column;
            box-shadow: 0 24px 60px #000a;
        }
        #results-header {
            padding: 18px 20px 14px; border-bottom: 1px solid #252525;
            display: flex; align-items: center; gap: 12px;
        }
        #results-title { font-size: 15px; font-weight: 700; flex: 1; }
        #results-totals { font-size: 12px; }
        #results-close {
            width: 28px; height: 28px; border: 1px solid #333; background: #222;
            color: #888; cursor: pointer; border-radius: 5px; font-size: 16px; line-height: 1;
            display: flex; align-items: center; justify-content: center;
        }
        #results-close:hover { background: #2a2a2a; color: #ccc; }

        #results-body { flex: 1; overflow-y: auto; padding: 12px 20px; display: flex; flex-direction: column; gap: 12px; }

        .suite-result { border: 1px solid #252525; border-radius: 6px; overflow: hidden; }
        .suite-result-header {
            padding: 8px 12px; background: #1e1e1e;
            display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 600;
        }
        .suite-result-header .suite-name { flex: 1; }
        .suite-pill {
            font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: 700;
        }
        .suite-pill.pass { background: #1b3a1f; color: #4caf50; }
        .suite-pill.fail { background: #3a1b1b; color: #e57373; }
        .suite-tests { }
        .suite-test-row {
            padding: 5px 12px 5px 20px; display: flex; align-items: center; gap: 8px;
            font-size: 11px; border-top: 1px solid #1e1e1e;
        }
        .suite-test-row .r-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
        .suite-test-row.pass .r-dot { background: #4caf50; }
        .suite-test-row.fail .r-dot { background: #e57373; }
        .suite-test-row .r-name { flex: 1; color: #ccc; }
        .suite-test-row .r-msg { font-size: 10px; color: #555; }
        .suite-test-row.fail .r-msg { color: #e5737388; }

        #results-footer {
            padding: 14px 20px; border-top: 1px solid #252525;
            display: flex; align-items: center; gap: 10px; justify-content: flex-end;
        }
        #download-btn {
            padding: 8px 16px; border: 1px solid #2e7d32; background: #1b3a1f;
            color: #4caf50; cursor: pointer; border-radius: 6px; font-size: 12px; font-weight: 600;
            display: flex; align-items: center; gap: 6px; transition: background .15s;
        }
        #download-btn:hover { background: #243e27; }
        #close-results-btn {
            padding: 8px 16px; border: 1px solid #2e2e2e; background: #1e1e1e;
            color: #aaa; cursor: pointer; border-radius: 6px; font-size: 12px; font-weight: 600;
            transition: background .15s;
        }
        #close-results-btn:hover { background: #252525; color: #ccc; }
    </style>
</head>
<body>

<!-- Left panel -->
<div id="left">
    <div id="toolbar">
        <!-- Test bench header -->
        <div style="
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 16px 0;
        ">
            <div style="
                border-radius: 50%;
                overflow: hidden;
                width: 140px;
                height: 140px;
                display: flex;
                align-items: center;
                justify-content: center;
                background: #111;
                box-shadow: 0 0 0 2px #333;
            ">
                <img src="./favicon.png" alt="Siperb" width="120" height="120">
            </div>
            <h1 style="
                margin: 4px 0 0;
                font-size: 22px;
                font-weight: 600;
                letter-spacing: 0.03em;
            ">
                Siperb Test Bench
            </h1>
            <div style="display:flex; align-items:center; gap:8px; margin-top:4px;">
                <div id="phone-status" style="font-size:13px; color:#9e9e9e;">⏳ Loading phone...</div>
                <button id="reload-btn" onclick="reloadPhone()" title="Reload phone" style="
                    padding:3px 7px; border:1px solid #2e2e2e; background:#1e1e1e;
                    color:#666; cursor:pointer; border-radius:4px; font-size:13px; line-height:1;
                    transition: background .15s, color .15s;
                " onmouseover="this.style.background='#252525';this.style.color='#aaa'"
                   onmouseout="this.style.background='#1e1e1e';this.style.color='#666'">↺</button>
            </div>
        </div>
      

        <div id="pick-row">
            <input type="file" id="filePicker" multiple accept=".js">

            <button class="pick-btn" onclick="pickFolder()">
                <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor">
                    <path d="M1 3.5A1.5 1.5 0 0 1 2.5 2h2.764c.958 0 1.76.56 2.311 1.184C7.985 3.648 8.48 4 9 4h4.5A1.5 1.5 0 0 1 15 5.5v7a1.5 1.5 0 0 1-1.5 1.5h-11A1.5 1.5 0 0 1 1 12.5v-9z"/>
                </svg>
                Folder
            </button>
           
            <button class="pick-btn" id="url-btn" onclick="toggleUrlRow()">
                <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor">
                    <path d="M4.715 6.542 3.343 7.914a3 3 0 1 0 4.243 4.243l1.828-1.829A3 3 0 0 0 8.586 5.5L8 6.086a1 1 0 0 0-.154.199 2 2 0 0 1 .861 3.337L6.88 11.45a2 2 0 1 1-2.83-2.83l.793-.792a4 4 0 0 1-.128-1.287z"/>
                    <path d="M6.586 4.672A3 3 0 0 0 7.414 9.5l.775-.776a2 2 0 0 1-.896-3.346L9.12 3.55a2 2 0 1 1 2.83 2.83l-.793.792c.112.42.155.855.128 1.287l1.372-1.372a3 3 0 1 0-4.243-4.243z"/>
                </svg>
                From URL
            </button>
        </div>

        <div id="url-row">
            <input type="text" id="github-url-input" placeholder="https://github.com/owner/repo/tree/branch/path">
            <button id="fetch-url-btn" onclick="fetchFromUrl()">Fetch</button>
        </div>

        <button id="run-btn" onclick="runAll()" disabled>
            <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
                <path d="M11.596 8.697l-6.363 3.692c-.54.313-1.233-.066-1.233-.697V4.308c0-.63.692-1.01 1.233-.696l6.363 3.692a.802.802 0 0 1 0 1.393z"/>
            </svg>
            Run Tests
        </button>

        <div id="stat-cards">
            <div class="stat-card" id="stat-total"><div class="stat-val" id="stat-total-val">—</div><div class="stat-lbl">Total</div></div>
            <div class="stat-card" id="stat-pass"><div class="stat-val" id="stat-pass-val">—</div><div class="stat-lbl">Pass</div></div>
            <div class="stat-card" id="stat-fail"><div class="stat-val" id="stat-fail-val">—</div><div class="stat-lbl">Failed</div></div>
        </div>
    </div>

    <div id="test-list"></div>
    <div id="log-area"></div>
</div>

<!-- Right panel: phone iframe -->
<div id="right">
    <iframe id="phoneFrame" src="./phone.html"></iframe>
</div>

<!-- Results dialog -->
<div id="results-overlay">
    <div id="results-dialog">
        <div id="results-header">
            <div id="results-title">Test Results</div>
            <div id="results-totals"></div>
            <button id="results-close" onclick="closeResults()">✕</button>
        </div>
        <div id="results-body"></div>
        <div id="results-footer">
            <button id="download-btn" onclick="downloadResults()">
                <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor">
                    <path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5z"/>
                    <path d="M7.646 11.854a.5.5 0 0 0 .708 0l3-3a.5.5 0 0 0-.708-.708L8.5 10.293V1.5a.5.5 0 0 0-1 0v8.793L5.354 8.146a.5.5 0 1 0-.708.708l3 3z"/>
                </svg>
                Download JSON
            </button>
            <button id="close-results-btn" onclick="closeResults()">Close</button>
        </div>
    </div>
</div>

<script>
    // ── State ────────────────────────────────────────────────────────────
    var testFiles   = [];
    var beforeRunMap = {};
    var phoneReady  = false;
    var lastResults = null;  // stored for download

    // ── Phone bootstrap ──────────────────────────────────────────────────

    async function bootstrapPhone() {
        setPhoneStatus('⏳ Loading phone...');
        var iframe = document.getElementById('phoneFrame');

        // Guard: builder module must be available
        if (typeof SiperbWorkBenchBuilder === 'undefined') {
            setPhoneStatus('⚠️ SiperbWorkBenchBuilder not loaded — serve via HTTP (run_tests.sh --ui)', 'error');
            return;
        }

        var cfg = window.TestConfig;
        if (!cfg) {
            try {
                var resp = await fetch('./test.config.json');
                if (!resp.ok) throw new Error('HTTP ' + resp.status);
                var raw = await resp.json();
                var env = raw.environment || 'testing';
                cfg = {
                    SESSION_ID: raw.SESSION_ID,
                    USER_ID:    raw.USER_ID,
                    DEVICE_ID:  raw.DEVICE_ID,
                    phoneVersionTreeUrl: raw['phone-version-tree-' + env],
                    UseLocalFiles: raw.UseLocalFiles || [],
                    Provisioning: null
                };
            } catch(e) {
                setPhoneStatus('⚠️ Could not load test.config.json: ' + e.message, 'error');
                return;
            }
        }
        if (!cfg.Provisioning || Object.keys(cfg.Provisioning).length === 0) {
            setPhoneStatus('⏳ Fetching provisioning...');
            try {
                // Fetch directly (same as build.js) — GetProvisioning gates on Platform==='script' and returns null otherwise
                var provUrl = 'https://api.siperb.com/Users/' + cfg.USER_ID + '/Devices/' + cfg.DEVICE_ID + '/?password=yes&settings_json=yes';
                var provResp = await fetch(provUrl, { headers: { 'Content-Type': 'application/json', 'X-Api-Key': cfg.SESSION_ID } });
                if (provResp.ok) {
                    var provData = await provResp.json();
                    cfg.Provisioning = provData.Settings_json || {};
                } else {
                    cfg.Provisioning = {};
                }
            } catch(e) { cfg.Provisioning = {}; }
        }
        setPhoneStatus('⏳ Loading phone...');

        function withTimeout(promise, ms, label) {
            var timer = new Promise(function(_, rej) {
                setTimeout(function() { rej(new Error(label + ' timed out after ' + ms/1000 + 's')); }, ms);
            });
            return Promise.race([promise, timer]);
        }

        try {
            await withTimeout(SiperbWorkBenchBuilder.LoadBrowserPhone(iframe, {
                treeUrl: cfg.phoneVersionTreeUrl, UseLocalFiles: cfg.UseLocalFiles
            }), 30000, 'LoadBrowserPhone');
            await withTimeout(SiperbWorkBenchBuilder.ProvisionPhone({
                Provisioning: cfg.Provisioning, PhoneFrame: iframe,
                ProfileUserId: cfg.DEVICE_ID, SessionId: cfg.SESSION_ID, UserId: cfg.USER_ID,
            }), 30000, 'ProvisionPhone');
            phoneReady = true;
            window.__phoneReady = true;
            setPhoneStatus('✓ Phone ready', 'ready');
            document.getElementById('run-btn').disabled = (testFiles.length === 0);
        } catch(e) {
            setPhoneStatus('✗ Phone failed: ' + (e.message || e), 'error');
            window.__phoneError = String(e);
        }
    }

    function setPhoneStatus(msg, cls) {
        var el = document.getElementById('phone-status');
        el.textContent = msg;
        el.style.color = cls === 'ready' ? '#4caf50' : cls === 'error' ? '#e57373' : '#9e9e9e';
    }

    function reloadPhone() {
        phoneReady = false;
        window.__phoneReady = false;
        window.__phoneError = undefined;
        document.getElementById('run-btn').disabled = true;
        // Don't reload the iframe src — LoadBrowserPhone calls document.open() which
        // replaces the iframe content itself. Re-navigating the iframe first causes a
        // race with the module script in phone.html aborting mid-import.
        bootstrapPhone();
    }

    // ── File / folder picking ────────────────────────────────────────────

    async function pickFolder() {
        try {
            var dirHandle = await window.showDirectoryPicker({ mode: 'read' });
            var rawFiles = [];
            await collectDirFiles(dirHandle, dirHandle.name, rawFiles);
            if (rawFiles.length) await loadRawFiles(rawFiles);
        } catch(e) {
            if (e.name !== 'AbortError') appendLog('Folder picker error: ' + e.message, 'fail');
        }
    }

    async function collectDirFiles(dirHandle, folderName, out) {
        for await (var entry of dirHandle.values()) {
            if (entry.kind === 'file' && entry.name.endsWith('.js')) {
                var file = await entry.getFile();
                out.push({ name: entry.name, folder: folderName, code: await file.text() });
            } else if (entry.kind === 'directory') {
                await collectDirFiles(entry, entry.name, out);
            }
        }
    }

    function pickFiles()  { document.getElementById('filePicker').click(); }

    function toggleUrlRow() {
        var row = document.getElementById('url-row');
        var btn = document.getElementById('url-btn');
        var open = row.classList.toggle('open');
        btn.classList.toggle('active', open);

        // Add default value to the github-url-input
        document.getElementById('github-url-input').value = 'https://github.com/Siperb/Siperb-Testing-Files/tree/main/tests/';
        if (open) document.getElementById('github-url-input').focus();
    }

    async function loadFileList(files) {
        testFiles    = [];
        beforeRunMap = {};
        var arr = Array.from(files).filter(function(f) { return f.name.endsWith('.js'); });

        for (var f of arr) {
            var code   = await f.text();
            var folder = f.webkitRelativePath
                ? f.webkitRelativePath.split('/').slice(-2, -1)[0]
                : 'default';
            if (f.name === 'beforeRun.js') {
                beforeRunMap[folder] = code;
            } else {
                testFiles.push({ name: f.name.replace('.js', ''), folder: folder, code: code, status: 'pending' });
            }
        }

        testFiles.sort(function(a, b) {
            return (a.folder + '/' + a.name).localeCompare(b.folder + '/' + b.name);
        });

        renderTestList();
        clearLogs();
        document.getElementById('run-btn').disabled = !(testFiles.length > 0 && phoneReady);
    }

    async function loadRawFiles(rawFiles) {
        // rawFiles: [{ name, folder, code }]
        testFiles    = [];
        beforeRunMap = {};
        for (var f of rawFiles) {
            if (f.name === 'beforeRun.js') {
                beforeRunMap[f.folder] = f.code;
            } else {
                testFiles.push({ name: f.name.replace('.js', ''), folder: f.folder, code: f.code, status: 'pending' });
            }
        }
        testFiles.sort(function(a, b) {
            return (a.folder + '/' + a.name).localeCompare(b.folder + '/' + b.name);
        });
        renderTestList();
        clearLogs();
        document.getElementById('run-btn').disabled = !(testFiles.length > 0 && phoneReady);
    }

    function clearLogs() {
        document.getElementById('log-area').innerHTML = '';
        document.getElementById('stat-total-val').textContent = '—';
        document.getElementById('stat-pass-val').textContent  = '—';
        document.getElementById('stat-fail-val').textContent  = '—';
    }

    // ── GitHub URL fetching ──────────────────────────────────────────────

    async function fetchFromUrl() {
        var rawUrl = document.getElementById('github-url-input').value.trim();
        if (!rawUrl) return;

        var btn = document.getElementById('fetch-url-btn');
        btn.textContent = 'Fetching…';
        btn.disabled = true;

        try {
            var match = rawUrl.match(/github\.com\/([^\/]+)\/([^\/]+)\/tree\/([^\/]+)\/?(.*)$/);
            if (!match) throw new Error('Paste a GitHub tree URL like: github.com/owner/repo/tree/branch/path');

            var owner = match[1], repo = match[2], branch = match[3], basePath = match[4].replace(/\/$/, '');
            var collected = [];
            await fetchGitHubDir(owner, repo, branch, basePath, basePath, collected);

            if (!collected.length) throw new Error('No .js files found at that path');
            await loadRawFiles(collected);

            // Collapse URL row after success
            document.getElementById('url-row').classList.remove('open');
            document.getElementById('url-btn').classList.remove('active');
        } catch(e) {
            appendLog('GitHub fetch error: ' + e.message, 'fail');
        }

        btn.textContent = 'Fetch';
        btn.disabled = false;
    }

    async function fetchGitHubDir(owner, repo, branch, path, basePath, collected) {
        var apiUrl = 'https://api.github.com/repos/' + owner + '/' + repo
            + '/contents/' + encodeURIComponent(path).replace(/%2F/g, '/') + '?ref=' + encodeURIComponent(branch);
        var resp = await fetch(apiUrl, { headers: { Accept: 'application/vnd.github.v3+json' } });
        if (!resp.ok) throw new Error('GitHub API ' + resp.status + ' for ' + path);
        var items = await resp.json();

        for (var item of items) {
            if (item.type === 'file' && item.name.endsWith('.js')) {
                var codeResp = await fetch(item.download_url);
                if (!codeResp.ok) throw new Error('Failed to download ' + item.name);
                var code = await codeResp.text();
                // folder = immediate parent dir relative to basePath
                var parts = item.path.split('/');
                var folder = parts.length > 1 ? parts[parts.length - 2] : 'default';
                // If the file sits directly in basePath, group by basePath's last segment
                if (item.path === basePath + '/' + item.name || parts.length === 1) {
                    var bParts = basePath.split('/');
                    folder = bParts[bParts.length - 1] || 'default';
                }
                collected.push({ name: item.name, folder: folder, code: code });
            } else if (item.type === 'dir') {
                await fetchGitHubDir(owner, repo, branch, item.path, basePath, collected);
            }
        }
    }

    document.getElementById('github-url-input').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') fetchFromUrl();
        if (e.key === 'Escape') toggleUrlRow();
    });


    document.getElementById('filePicker').addEventListener('change', function(e) {
        loadFileList(e.target.files);
        e.target.value = '';
    });

    // ── Render test list ─────────────────────────────────────────────────

    function renderTestList() {
        var list = document.getElementById('test-list');
        list.innerHTML = '';
        var lastFolder = null;
        for (var i = 0; i < testFiles.length; i++) {
            var t = testFiles[i];
            if (t.folder !== lastFolder) {
                lastFolder = t.folder;
                var hdr = document.createElement('div');
                hdr.className = 'suite-header';
                hdr.textContent = t.folder;
                list.appendChild(hdr);
            }
            var el = document.createElement('div');
            el.className = 'test-item';
            el.id = 'test-item-' + i;
            el.innerHTML = '<div class="dot"></div>'
                + '<span class="test-label">' + t.name + '</span>'
                + '<span class="test-msg"></span>';
            list.appendChild(el);
        }
    }

    function updateTestItem(index, status, msg) {
        testFiles[index].status = status;
        var el = document.getElementById('test-item-' + index);
        if (!el) return;
        el.className = 'test-item ' + status;
        var msgEl = el.querySelector('.test-msg');
        if (msgEl && msg) msgEl.textContent = msg;
    }

    function appendLog(msg, type) {
        var log = document.getElementById('log-area');
        var line = document.createElement('div');
        line.className = 'log-line ' + (type || 'log');
        line.textContent = msg;
        log.appendChild(line);
        log.scrollTop = log.scrollHeight;
    }

    // ── Stats cards ──────────────────────────────────────────────────────

    function updateStats(total, pass, fail) {
        document.getElementById('stat-total-val').textContent = total;
        document.getElementById('stat-pass-val').textContent  = pass;
        document.getElementById('stat-fail-val').textContent  = fail;
    }

    // ── Test runner ──────────────────────────────────────────────────────

    async function runAll() {
        if (!phoneReady) { appendLog('Phone not ready.', 'fail'); return; }
        document.getElementById('run-btn').disabled = true;
        document.getElementById('log-area').innerHTML = '';
        lastResults = { timestamp: new Date().toISOString(), suites: {} };

        var passCount = 0, failCount = 0;
        updateStats(testFiles.length, 0, 0);

        var lastFolder = null;
        for (var i = 0; i < testFiles.length; i++) {
            var t = testFiles[i];
            if (t.folder !== lastFolder) {
                lastFolder = t.folder;
                appendLog('── ' + t.folder + ' ──', 'section');
            }
            updateTestItem(i, 'running');
            var result = await runTest(t);
            updateTestItem(i, result.status, result.message);
            appendLog('  ' + (result.status === 'pass' ? '✓' : '✗') + ' ' + t.name + '  ' + result.message, result.status);

            if (result.status === 'pass') passCount++; else failCount++;
            updateStats(testFiles.length, passCount, failCount);

            if (!lastResults.suites[t.folder]) lastResults.suites[t.folder] = [];
            lastResults.suites[t.folder].push({ name: t.name, status: result.status, message: result.message });
        }

        document.getElementById('run-btn').disabled = false;
        showResults();
    }

    async function runTest(t) {
        var iframe = document.getElementById('phoneFrame');
        var iw = iframe.contentWindow;

        var origLog = window.TestApp.Log.bind(window.TestApp);
        window.TestApp.Log = function(msg) { origLog(msg); appendLog('    ' + String(msg), 'log'); };

        window.TestApp.RunBeforeEach();
        iw.TestApp = window.TestApp;

        var beforeRunCode = beforeRunMap[t.folder] || null;
        if (beforeRunCode) {
            try {
                await (new iw.Function('phone', 'TestApp',
                    'return (async () => { ' + beforeRunCode + ' })()'
                ))(iw.phone, iw.TestApp);
            } catch(e) {
                return { status: 'fail', message: 'beforeRun failed: ' + e.message };
            }
        }

        iw.__testResult = null;
        window.__testResult = null;
        window.TestApp._result = null;

        try {
            await (new iw.Function('phone', 'TestApp',
                'return (async () => { ' + t.code + ' })()'
            ))(iw.phone, iw.TestApp);
            return iw.__testResult || window.__testResult || { status: 'pass', message: 'ok' };
        } catch(e) {
            return { status: 'fail', message: e.message };
        }
    }

    // ── Results dialog ───────────────────────────────────────────────────

    function showResults() {
        var body = document.getElementById('results-body');
        body.innerHTML = '';

        var totalPass = 0, totalFail = 0;

        for (var [suite, tests] of Object.entries(lastResults.suites)) {
            var pass = tests.filter(function(t) { return t.status === 'pass'; }).length;
            var fail = tests.length - pass;
            totalPass += pass; totalFail += fail;

            var div = document.createElement('div');
            div.className = 'suite-result';
            var headerHtml = '<div class="suite-result-header">'
                + '<span class="suite-name">' + suite + '</span>'
                + '<span class="suite-pill ' + (fail === 0 ? 'pass' : 'fail') + '">'
                + pass + '/' + tests.length + '</span>'
                + '</div><div class="suite-tests">';
            var rowsHtml = '';
            for (var t of tests) {
                rowsHtml += '<div class="suite-test-row ' + t.status + '">'
                    + '<div class="r-dot"></div>'
                    + '<span class="r-name">' + t.name + '</span>'
                    + '<span class="r-msg">' + t.message + '</span>'
                    + '</div>';
            }
            div.innerHTML = headerHtml + rowsHtml + '</div>';
            body.appendChild(div);
        }

        var total = totalPass + totalFail;
        var titleEl = document.getElementById('results-title');
        titleEl.textContent = totalFail === 0 ? '✓ All Tests Passed' : '✗ Tests Failed';
        titleEl.style.color = totalFail === 0 ? '#4caf50' : '#e57373';

        document.getElementById('results-totals').innerHTML =
            '<span style="color:' + (totalFail===0?'#4caf50':'#e57373') + ';font-weight:700">'
            + totalPass + '/' + total + ' passed</span>';

        document.getElementById('results-overlay').classList.add('open');
    }

    function closeResults() {
        document.getElementById('results-overlay').classList.remove('open');
    }

    function downloadResults() {
        if (!lastResults) return;
        var ts  = new Date().toISOString().replace(/[:.]/g, '-');
        var json = JSON.stringify(lastResults, null, 2);
        var blob = new Blob([json], { type: 'application/json' });
        var url  = URL.createObjectURL(blob);
        var a    = document.createElement('a');
        a.href = url; a.download = 'test-results-' + ts + '.json';
        a.click();
        URL.revokeObjectURL(url);
    }

    // Close on overlay click
    document.getElementById('results-overlay').addEventListener('click', function(e) {
        if (e.target === this) closeResults();
    });

    // ── Init ─────────────────────────────────────────────────────────────
    window.addEventListener('load', bootstrapPhone);
</script>
</body>
</html>
