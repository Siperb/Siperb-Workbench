<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siperb Workbench — Test Bench</title>
    <script type="module" src="./builder/SiperbWorkBenchBuilder.js"></script>
    <script src="./main.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { display: flex; height: 100vh; font-family: monospace; font-size: 13px; background: #1a1a1a; color: #e0e0e0; }

        /* Left panel */
        #left { width: 380px; min-width: 280px; display: flex; flex-direction: column; border-right: 1px solid #333; }
        #toolbar { padding: 10px; background: #222; border-bottom: 1px solid #333; display: flex; flex-direction: column; gap: 8px; }
        #toolbar h1 { font-size: 13px; color: #888; letter-spacing: 1px; text-transform: uppercase; }
        #file-row { display: flex; gap: 6px; align-items: center; }
        #filePicker { display: none; }
        #pick-btn, #run-btn { padding: 5px 10px; border: 1px solid #555; background: #2a2a2a; color: #ccc; cursor: pointer; border-radius: 3px; font-size: 12px; }
        #pick-btn:hover, #run-btn:hover { background: #3a3a3a; }
        #run-btn { background: #1a3a1a; border-color: #3a5a3a; color: #8fc88f; }
        #run-btn:hover { background: #2a4a2a; }
        #run-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        #status-bar { font-size: 11px; color: #666; }
        #phone-status { font-size: 11px; color: #888; }

        /* Test list */
        #test-list { overflow-y: auto; border-bottom: 1px solid #333; max-height: 200px; }
        .test-item { padding: 5px 10px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid #2a2a2a; }
        .badge { font-size: 10px; padding: 1px 5px; border-radius: 2px; margin-left: auto; }
        .badge.pass { background: #1a3a1a; color: #6a9; }
        .badge.fail { background: #3a1a1a; color: #c66; }
        .badge.running { background: #1a2a3a; color: #68a; }

        /* Log area */
        #log-area { flex: 1; overflow-y: auto; padding: 8px; background: #0f0f0f; }
        .log-line { padding: 2px 0; line-height: 1.5; word-break: break-all; }
        .log-line.info { color: #888; }
        .log-line.pass { color: #6a9; }
        .log-line.fail { color: #c66; }
        .log-line.log { color: #aaa; }
        .log-line.section { color: #68a; margin-top: 4px; }

        /* Right panel */
        #right { flex: 1; display: flex; flex-direction: column; }
        #phoneFrame { flex: 1; width: 100%; border: none; background: #fff; }
    </style>
</head>
<body>

<!-- Left panel -->
<div id="left">
    <div id="toolbar">
        <h1>Siperb Test Bench</h1>
        <div id="phone-status">⏳ Loading phone...</div>
        <div id="file-row">
            <input type="file" id="filePicker" multiple accept=".js">
            <button id="pick-btn" onclick="pickFiles()">Pick Test Files</button>
            <button id="run-btn" onclick="runAll()" disabled>▶ Run All</button>
        </div>
        <div id="status-bar">No files selected</div>
    </div>
    <div id="test-list"></div>
    <div id="log-area"></div>
</div>

<!-- Right panel: phone iframe -->
<div id="right">
    <iframe id="phoneFrame" src="./phone.html"></iframe>
</div>

<script>
    // ── State ──────────────────────────────────────────────────────────────
    var testFiles = [];
    var beforeRunMap = {};
    var phoneReady = false;

    // ── Phone bootstrap ────────────────────────────────────────────────────

    async function bootstrapPhone() {
        setPhoneStatus('⏳ Loading phone...');
        var iframe = document.getElementById('phoneFrame');

        // Use pre-built TestConfig (runner.html) or fetch test.config.json at runtime
        var cfg = window.TestConfig;
        if (!cfg) {
            try {
                var resp = await fetch('./test.config.json');
                if (!resp.ok) throw new Error('HTTP ' + resp.status);
                var raw = await resp.json();
                var env = raw.environment || 'testing';
                cfg = {
                    SESSION_ID: raw.SESSION_ID,
                    USER_ID: raw.USER_ID,
                    DEVICE_ID: raw.DEVICE_ID,
                    phoneVersionTreeUrl: raw['phone-version-tree-' + env],
                    UseLocalFiles: raw.UseLocalFiles || [],
                    Provisioning: null
                };
            } catch(e) {
                setPhoneStatus('⚠️ Could not load test.config.json: ' + e.message);
                return;
            }
        }

        // Fetch provisioning at runtime if not pre-built
        if (!cfg.Provisioning || Object.keys(cfg.Provisioning).length === 0) {
            setPhoneStatus('⏳ Fetching provisioning...');
            try {
                cfg.Provisioning = await SiperbWorkBenchBuilder.GetProvisioning({
                    UserId: cfg.USER_ID,
                    DeviceToken: cfg.DEVICE_ID,
                    SessionToken: cfg.SESSION_ID,
                }) || {};
            } catch(e) {
                cfg.Provisioning = {};
            }
        }

        setPhoneStatus('⏳ Loading phone...');
        try {
            await SiperbWorkBenchBuilder.LoadBrowserPhone(iframe, {
                treeUrl: cfg.phoneVersionTreeUrl,
                UseLocalFiles: cfg.UseLocalFiles
            });
            await SiperbWorkBenchBuilder.ProvisionPhone({
                Provisioning: cfg.Provisioning,
                PhoneFrame: iframe,
                ProfileUserId: cfg.DEVICE_ID,
                SessionId: cfg.SESSION_ID,
                UserId: cfg.USER_ID,
            });
            phoneReady = true;
            window.__phoneReady = true;
            setPhoneStatus('✓ Phone ready');
            document.getElementById('run-btn').disabled = (testFiles.length === 0);
        } catch(e) {
            setPhoneStatus('✗ Phone failed: ' + (e.message || e));
            window.__phoneError = String(e);
        }
    }

    function setPhoneStatus(msg) {
        document.getElementById('phone-status').textContent = msg;
    }

    // ── File picking ───────────────────────────────────────────────────────

    function pickFiles() {
        document.getElementById('filePicker').click();
    }

    document.getElementById('filePicker').addEventListener('change', async function(e) {
        var files = Array.from(e.target.files);
        testFiles = [];
        beforeRunMap = {};

        var beforeRunFiles = files.filter(function(f) { return f.name === 'beforeRun.js'; });
        var actualTests = files.filter(function(f) { return f.name !== 'beforeRun.js' && f.name.endsWith('.js'); });

        for (var i = 0; i < beforeRunFiles.length; i++) {
            var f = beforeRunFiles[i];
            var code = await f.text();
            var folder = f.webkitRelativePath
                ? f.webkitRelativePath.split('/').slice(-2, -1)[0]
                : 'default';
            beforeRunMap[folder] = code;
        }

        for (var i = 0; i < actualTests.length; i++) {
            var f = actualTests[i];
            var code = await f.text();
            var folder = f.webkitRelativePath
                ? f.webkitRelativePath.split('/').slice(-2, -1)[0]
                : 'default';
            testFiles.push({ name: f.name.replace('.js', ''), folder: folder, code: code, status: 'pending' });
        }

        renderTestList();
        document.getElementById('status-bar').textContent = testFiles.length + ' test(s) selected';
        if (testFiles.length > 0 && phoneReady) {
            document.getElementById('run-btn').disabled = false;
        }
        e.target.value = '';
    });

    // ── Rendering ──────────────────────────────────────────────────────────

    function renderTestList() {
        var list = document.getElementById('test-list');
        list.innerHTML = '';
        for (var i = 0; i < testFiles.length; i++) {
            var t = testFiles[i];
            var el = document.createElement('div');
            el.className = 'test-item';
            el.id = 'test-item-' + i;
            var span = document.createElement('span');
            span.textContent = t.folder + '/' + t.name;
            el.appendChild(span);
            list.appendChild(el);
        }
    }

    function updateTestItem(index, status) {
        testFiles[index].status = status;
        var el = document.getElementById('test-item-' + index);
        if (!el) return;
        var badge = el.querySelector('.badge');
        if (badge) badge.remove();
        var b = document.createElement('span');
        b.className = 'badge ' + status;
        b.textContent = status;
        el.appendChild(b);
    }

    function appendLog(msg, type) {
        var log = document.getElementById('log-area');
        var line = document.createElement('div');
        line.className = 'log-line ' + (type || 'log');
        line.textContent = msg;
        log.appendChild(line);
        log.scrollTop = log.scrollHeight;
    }

    // ── Test runner ────────────────────────────────────────────────────────

    async function runAll() {
        if (!phoneReady) { appendLog('Phone not ready yet.', 'fail'); return; }
        document.getElementById('run-btn').disabled = true;
        document.getElementById('log-area').innerHTML = '';

        for (var i = 0; i < testFiles.length; i++) {
            var t = testFiles[i];
            updateTestItem(i, 'running');
            appendLog('── ' + t.folder + '/' + t.name + ' ──', 'section');
            var result = await runTest(t);
            updateTestItem(i, result.status);
            appendLog((result.status === 'pass' ? '✓ ' : '✗ ') + result.message, result.status);
        }

        document.getElementById('run-btn').disabled = false;
    }

    async function runTest(t) {
        var iframe = document.getElementById('phoneFrame');
        var iw = iframe.contentWindow;

        // Pipe TestApp.Log to left panel
        var origLog = window.TestApp.Log.bind(window.TestApp);
        window.TestApp.Log = function(msg) {
            origLog(msg);
            appendLog('  [log] ' + String(msg), 'log');
        };

        // 1. Reset TestApp state
        window.TestApp.RunBeforeEach();
        iw.TestApp = window.TestApp;

        // 2. Run beforeRun.js if available
        var beforeRunCode = beforeRunMap[t.folder] || null;
        if (beforeRunCode) {
            try {
                var beforeFn = new iw.Function('phone', 'TestApp',
                    'return (async () => { ' + beforeRunCode + ' })()'
                );
                await beforeFn(iw.phone, iw.TestApp);
                appendLog('  [setup] beforeRun completed', 'info');
            } catch(e) {
                return { status: 'fail', message: 'beforeRun failed: ' + e.message };
            }
        }

        // 3. Reset result so beforeRun's TestApp.Pass doesn't bleed into test result
        iw.__testResult = null;
        window.__testResult = null;
        window.TestApp._result = null;

        // 4. Run the test
        try {
            var fn = new iw.Function('phone', 'TestApp',
                'return (async () => { ' + t.code + ' })()'
            );
            await fn(iw.phone, iw.TestApp);
            return iw.__testResult || window.__testResult || { status: 'pass', message: 'ok' };
        } catch(e) {
            return { status: 'fail', message: e.message };
        }
    }

    // ── Init ───────────────────────────────────────────────────────────────

    window.addEventListener('load', bootstrapPhone);
</script>
</body>
</html>
