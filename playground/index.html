<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body>
<script>
    // Extract filename from path e.g. /playground/adding_a_buddy → ?file=adding_a_buddy
    var parts = location.pathname.replace(/\/+$/, '').split('/');
    var last = parts[parts.length - 1];
    var isNamed = last && last !== 'index.html' && last !== 'playground';
    var search = isNamed
        ? '?file=' + encodeURIComponent(last) + (location.search ? '&' + location.search.slice(1) : '')
        : (location.search || '');
    location.replace('../playground-container.html' + search + location.hash);
</script>
</body>
</html>
